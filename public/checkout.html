<!DOCTYPE html>
<html lang="it" class="sl-theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#145d2f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ABT">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <script src="/assets/pwa.js" defer></script>
  <title>Chiusura conto -- Customer QR Tracker</title>
  <link rel="stylesheet" href="/vendor/shoelace/2.20.1/themes/light.css">
  <link rel="stylesheet" href="/assets/app.css">
  <script src="/vendor/supabase/2.105.3/supabase.js"></script>
  <script src="/assets/config.js"></script>
  <script src="/assets/strings.js"></script>
  <script src="/assets/auth.js"></script>
  <script src="/assets/nav.js"></script>
  <script defer src="/vendor/alpinejs/3.15.12/alpine.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .balance-card {
      padding: 0.75rem 1rem;
      background: var(--sl-color-neutral-50);
      border-radius: var(--sl-border-radius-medium);
      margin: 0.5rem 0 1rem 0;
      font-size: 1.15rem;
    }
    ul.transactions { list-style: none; padding: 0; margin: 0 0 1rem 0; }
    li.tx {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
      gap: 0.25rem 0.75rem;
      padding: 0.5rem 0.4rem;
      border-bottom: 1px solid var(--sl-color-neutral-200);
    }
    li.tx-annulled .tx-desc { opacity: 0.7; }
    .tx-time { font-size: 0.85rem; color: var(--sl-color-neutral-500); }
    .tx-sub-info { grid-column: 2 / -1; font-size: 0.85rem; color: var(--sl-color-neutral-500); }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: var(--sl-border-radius-small);
      font-family: monospace;
      font-size: 0.75rem;
    }
    .badge-aperto    { background: var(--sl-color-warning-600); color: var(--sl-color-neutral-0); }
    .badge-annullato { background: var(--sl-color-neutral-600); color: var(--sl-color-neutral-0); }
    .method-row { margin-bottom: 1rem; }
    .method-row select { width: 100%; }
    .submit-cta { width: 100%; font-size: 1.1rem; height: auto; padding: 0.9rem; }
    .submit-error { color: var(--sl-color-danger-700); margin-top: 0.5rem; text-align: center; }
    .race-alert {
      padding: 0.75rem 1rem;
      background: var(--sl-color-warning-50);
      border: 1px solid var(--sl-color-warning-300);
      border-radius: var(--sl-border-radius-medium);
      margin-top: 1rem;
    }
    .race-alert .btn { margin-top: 0.5rem; }
  </style>
</head>
<body x-cloak x-data="checkoutPage" x-init="init()">
  <nav class="app-nav" x-data="appNav" x-init="init()">
    <h1 x-text="t.checkout.title"></h1>
    <div class="nav-actions">
      <template x-for="item in items" :key="item.path">
        <a class="btn btn--ghost" :class="item.isCurrent ? 'btn--current' : ''"
           :href="item.path" x-text="item.label"></a>
      </template>
      <button class="btn btn--outline" @click="logout()" x-text="t.logout"></button>
    </div>
  </nav>
  <main class="container">
    <a href="/customers" x-text="t.checkout.backToList"></a>

    <article x-show="notFound" x-cloak><p x-text="t.checkout.notFound"></p></article>

    <template x-if="customer">
      <div>
        <h2 x-text="customer.last_name + ' ' + customer.first_name"></h2>

        <h3 x-text="t.checkout.sectionMovements"></h3>

        <article x-show="displayTransactions.length === 0" x-cloak>
          <p x-text="t.checkout.emptyMovements"></p>
        </article>

        <ul class="transactions" x-show="displayTransactions.length > 0" x-cloak>
          <template x-for="tx in displayTransactions" :key="tx.id">
            <li class="tx" :class="txCssClass(tx)">
              <div class="tx-time" x-text="formatTxTime(tx.created_at)"></div>
              <div class="tx-desc" x-text="describeTx(tx)"></div>
              <div class="tx-state">
                <span class="badge" :class="badgeClass(tx)" x-text="badgeText(tx)"></span>
              </div>
              <div class="tx-sub-info" x-show="subInfoText(tx)" x-cloak x-text="subInfoText(tx)"></div>
            </li>
          </template>
        </ul>

        <div class="balance-card">
          <strong x-text="t.checkout.balanceLabel"></strong>:
          <span x-text="formatBalance(openBalance) + ' EUR'"></span>
        </div>

        <div class="method-row" x-show="openBalance > 0 && !postUpdateAlert" x-cloak>
          <label>
            <span x-text="t.checkout.methodLabel"></span>
            <select x-model="method" :disabled="submitting">
              <template x-for="(label, code) in t.paymentMethods" :key="code">
                <option :value="code" x-text="label"></option>
              </template>
            </select>
          </label>
        </div>

        <button class="btn btn--primary submit-cta"
                x-show="!postUpdateAlert"
                :disabled="!canSubmit()"
                @click="submit()"
                x-text="submitButtonLabel()"></button>

        <div x-show="error" x-cloak class="submit-error" role="alert" x-text="error"></div>

        <div class="race-alert" x-show="postUpdateAlert" x-cloak>
          <p x-text="postUpdateAlert ? t.checkout.raceAlert(postUpdateAlert.newCount) : ''"></p>
          <button class="btn btn--primary" @click="reloadPage()" x-text="t.checkout.raceReload"></button>
        </div>
      </div>
    </template>
  </main>

  <script>
    document.addEventListener('alpine:init', function () {
      Alpine.data('checkoutPage', function () {
        return {
          t: window.Strings,
          customer: null,
          notFound: false,
          transactions: [],
          displayTransactions: [],
          reversalByCharge: {},
          transactionIds: [],
          reversedIds: new Set(),
          openBalance: 0,
          method: 'cash',
          submitting: false,
          error: null,
          postUpdateAlert: null,
          session: null,
          async init() {
            var session = await window.Auth.requireAdmin();
            if (!session) return;
            document.body.removeAttribute('x-cloak');
            this.session = session;
            var match = location.pathname.match(/^\/checkout\/([0-9a-f-]{36})\/?$/);
            if (!match) { this.notFound = true; return; }
            var id = match[1];
            var resp = await window.Auth.client.from('customers')
              .select('id, first_name, last_name')
              .eq('id', id).is('deleted_at', null).maybeSingle();
            if (resp.error || !resp.data) {
              this.notFound = true;
              return;
            }
            this.customer = resp.data;
            await this.loadOpenTransactions();
          },
          async loadOpenTransactions() {
            var resp = await window.Auth.client.from('transactions')
              .select('id, type, amount, reversal_of_id, created_at')
              .eq('customer_id', this.customer.id)
              .eq('paid', false)
              .is('deleted_at', null)
              .order('created_at', { ascending: false });
            if (resp.error) {
              console.error('[checkout] loadOpenTransactions error', resp.error);
              this.transactions = [];
              this.displayTransactions = [];
              this.reversalByCharge = {};
              this.transactionIds = [];
              this.reversedIds = new Set();
              this.openBalance = 0;
              this.error = this.t.errors.network;
              return;
            }
            this.transactions = resp.data || [];
            this.transactionIds = this.transactions.map(function (tx) { return tx.id; });
            // Indici per rendering "riga unica" charge+reversal.
            // L'UPDATE batch usa transactionIds (intero set, charges e reversals).
            // Il rendering usa displayTransactions (solo charges + reversal orfani).
            this.reversedIds = new Set();
            this.reversalByCharge = {};
            var chargeIds = new Set();
            for (var i = 0; i < this.transactions.length; i++) {
              if (this.transactions[i].type === 'charge') chargeIds.add(this.transactions[i].id);
            }
            for (var j = 0; j < this.transactions.length; j++) {
              var tx = this.transactions[j];
              if (tx.type === 'reversal' && tx.reversal_of_id) {
                this.reversedIds.add(tx.reversal_of_id);
                this.reversalByCharge[tx.reversal_of_id] = tx;
              }
            }
            this.displayTransactions = this.transactions.filter(function (t) {
              if (t.type === 'charge') return true;
              if (t.reversal_of_id && chargeIds.has(t.reversal_of_id)) return false;
              return true;
            });
            this.recomputeBalance();
          },
          recomputeBalance() {
            var sumCh = 0, sumRev = 0;
            for (var i = 0; i < this.transactions.length; i++) {
              var tx = this.transactions[i];
              var amt = parseFloat(tx.amount) || 0;
              if (tx.type === 'charge') sumCh += amt;
              else if (tx.type === 'reversal') sumRev += amt;
            }
            this.openBalance = Math.round((sumCh - sumRev) * 100) / 100;
          },
          formatBalance(n) {
            try {
              return Number(n).toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            } catch (e) { return String(n); }
          },
          formatTxTime(iso) {
            try {
              var d = new Date(iso);
              var dd = String(d.getDate()).padStart(2, '0');
              var mm = String(d.getMonth() + 1).padStart(2, '0');
              var hh = String(d.getHours()).padStart(2, '0');
              var mi = String(d.getMinutes()).padStart(2, '0');
              return dd + '/' + mm + ' ' + hh + ':' + mi;
            } catch (e) { return iso; }
          },
          describeTx(tx) {
            var amount = this.formatBalance(tx.amount);
            return tx.type === 'charge'
              ? this.t.customerDetail.transactions.descCharge(amount)
              : this.t.customerDetail.transactions.descReversal(amount);
          },
          txCssClass(tx) {
            if (tx.type === 'charge' && this.reversedIds.has(tx.id)) return 'tx-annulled';
            return '';
          },
          badgeText(tx) {
            if (tx.type === 'charge' && this.reversedIds.has(tx.id)) return this.t.customerDetail.transactions.badgeAnnullato;
            return this.t.customerDetail.transactions.badgeAperto;
          },
          badgeClass(tx) {
            if (tx.type === 'charge' && this.reversedIds.has(tx.id)) return 'badge-annullato';
            return 'badge-aperto';
          },
          subInfoText(tx) {
            if (tx.type === 'charge' && this.reversedIds.has(tx.id)) {
              var rev = this.reversalByCharge[tx.id];
              if (rev) {
                return this.t.customerDetail.transactions.annulledInfo(this.formatTxTime(rev.created_at));
              }
            }
            return '';
          },
          canSubmit() {
            return !this.submitting && this.openBalance > 0 && !!this.method && !this.postUpdateAlert;
          },
          submitButtonLabel() {
            if (this.submitting) return this.t.checkout.submitting;
            if (this.openBalance <= 0) return this.t.checkout.emptyBalanceCta;
            var methodLabel = this.t.paymentMethods[this.method] || this.method;
            return this.t.checkout.confirmCta(this.formatBalance(this.openBalance), methodLabel);
          },
          async submit() {
            if (!this.canSubmit()) return;
            this.submitting = true;
            this.error = null;
            var nowIso = new Date().toISOString();
            var resp = await window.Auth.client.from('transactions')
              .update({
                paid: true,
                paid_at: nowIso,
                payment_method: this.method,
                paid_by_id: this.session.user.id
              })
              .in('id', this.transactionIds)
              .select('id');
            if (resp.error) {
              console.error('[checkout] update error', resp.error);
              this.error = this.t.checkout.error;
              this.submitting = false;
              return;
            }
            var updatedCount = (resp.data || []).length;
            if (updatedCount < this.transactionIds.length) {
              console.warn('[checkout] partial update', { expected: this.transactionIds.length, got: updatedCount });
              this.error = this.t.checkout.partial;
              this.submitting = false;
              return;
            }
            var postCount = await window.Auth.client.from('transactions')
              .select('id', { count: 'exact', head: true })
              .eq('customer_id', this.customer.id)
              .eq('paid', false)
              .is('deleted_at', null);
            this.submitting = false;
            if (postCount.error) {
              console.warn('[checkout] post-count error', postCount.error);
              window.location.replace('/customers/' + this.customer.id);
              return;
            }
            if ((postCount.count || 0) === 0) {
              window.location.replace('/customers/' + this.customer.id);
              return;
            }
            this.postUpdateAlert = { newCount: postCount.count };
          },
          reloadPage() {
            window.location.reload();
          },
          async logout() { await window.Auth.signOut(); }
        };
      });
    });
  </script>
</body>
</html>
