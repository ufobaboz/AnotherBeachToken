<!DOCTYPE html>
<html lang="it" class="sl-theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f8a3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ABT">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <script src="/assets/pwa.js" defer></script>
  <title>Reset stagione -- AnotherBeachToken</title>
  <link rel="stylesheet" href="/vendor/shoelace/2.20.1/themes/light.css">
  <link rel="stylesheet" href="/assets/app.css">
  <script src="/vendor/supabase/2.105.3/supabase.js"></script>
  <script src="/assets/config.js"></script>
  <script src="/assets/strings.js"></script>
  <script src="/assets/auth.js"></script>
  <script src="/assets/nav.js"></script>
  <script type="module" src="/vendor/shoelace/2.20.1/components/dialog/dialog.js"></script>
  <script type="module" src="/vendor/shoelace/2.20.1/components/button/button.js"></script>
  <script defer src="/vendor/alpinejs/3.15.12/alpine.min.js"></script>
  <style>
    section.reset {
      margin-top: var(--space-5);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      border: 1px solid rgba(200,58,58,.4);
      background: var(--color-danger-soft);
    }
    section.reset h2 { color: var(--color-danger-ink); }
  </style>
</head>
<body x-cloak x-data="adminResetSeasonPage" x-init="init()">
  <nav class="app-nav" x-data="appNav" x-init="init()">
    <h1 x-text="t.adminResetSeason.title"></h1>
    <div class="nav-actions">
      <template x-for="item in items" :key="item.path">
        <a class="btn btn--ghost" :class="item.isCurrent ? 'btn--current' : ''"
           :href="item.path" x-text="item.label"></a>
      </template>
      <button class="btn btn--outline" @click="logout()" x-text="t.logout"></button>
    </div>
  </nav>

  <main class="container">
    <article role="status" x-show="successMessage" x-cloak x-text="successMessage"></article>
    <article class="error" role="alert" x-show="errorMessage" x-cloak x-text="errorMessage"></article>

    <section class="reset">
      <h2 x-text="t.adminResetSeason.title"></h2>
      <p x-text="t.adminResetSeason.intro"></p>
      <button class="btn btn--danger" @click="openResetDialog()" x-text="t.adminResetSeason.resetButton"></button>
    </section>

    <sl-dialog x-ref="resetDialog" :label="t.adminResetSeason.resetDialogTitle">
      <p x-text="t.adminResetSeason.resetDialogBody"></p>
      <p>
        <span x-text="t.adminResetSeason.resetConfirmHint"></span>
        <strong x-text="t.adminResetSeason.resetConfirmString"></strong>
      </p>
      <input type="text" class="confirm-input" x-model="confirmText"
             :placeholder="t.adminResetSeason.resetConfirmPlaceholder"
             :disabled="submitting" autocomplete="off">
      <sl-button slot="footer" variant="default" @click="closeResetDialog()" :disabled="submitting"
                 x-text="t.adminResetSeason.cancel"></sl-button>
      <sl-button slot="footer" variant="danger" @click="submitReset()"
                 :loading="submitting"
                 :disabled="confirmText !== t.adminResetSeason.resetConfirmString || submitting"
                 x-text="submitting ? t.adminResetSeason.resetting : t.adminResetSeason.confirmReset"></sl-button>
    </sl-dialog>
  </main>

  <script>
    document.addEventListener('alpine:init', function () {
      Alpine.data('adminResetSeasonPage', function () {
        return {
          t: window.Strings,
          submitting: false,
          confirmText: '',
          successMessage: null,
          errorMessage: null,
          async init() {
            var session = await window.Auth.requireSuperAdmin();
            if (!session) return;
            document.body.removeAttribute('x-cloak');
          },
          openResetDialog() {
            this.confirmText = '';
            this.errorMessage = null;
            this.successMessage = null;
            this.$refs.resetDialog.show();
          },
          closeResetDialog() {
            if (this.submitting) return;
            this.$refs.resetDialog.hide();
          },
          async submitReset() {
            if (this.submitting) return;
            if (this.confirmText !== this.t.adminResetSeason.resetConfirmString) return;
            this.submitting = true;
            this.errorMessage = null;
            try {
              var resp = await window.Auth.callEdgeFunction('reset-season', {});
              if (resp.status !== 200) {
                console.error('[admin-reset-season] reset-season failed', resp);
                this.errorMessage = this.t.adminResetSeason.resetError;
                return;
              }
              this.$refs.resetDialog.hide();
              this.confirmText = '';
              this.successMessage = this.t.adminResetSeason.resetSuccess;
            } catch (e) {
              console.error('[admin-reset-season] reset exception', e);
              this.errorMessage = this.t.adminResetSeason.resetError;
            } finally {
              this.submitting = false;
            }
          },
          async logout() { await window.Auth.signOut(); }
        };
      });
    });
  </script>
</body>
</html>
