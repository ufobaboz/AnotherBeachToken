<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clienti -- Customer QR Tracker</title>
  <link rel="stylesheet" href="/vendor/pico/2.1.1/pico.min.css">
  <script src="/vendor/supabase/2.105.3/supabase.js"></script>
  <script src="/assets/config.js"></script>
  <script src="/assets/strings.js"></script>
  <script src="/assets/auth.js"></script>
  <script defer src="/vendor/alpinejs/3.15.12/alpine.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    nav.app-nav { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 1rem; border-bottom: 1px solid var(--pico-muted-border-color); }
    nav.app-nav h1 { margin: 0; font-size: 1.1rem; }
  </style>
</head>
<body x-cloak x-data="customersPage" x-init="init()">
  <nav class="app-nav">
    <h1 x-text="t.customers.title"></h1>
    <button class="secondary" @click="logout()" x-text="t.logout"></button>
  </nav>

  <main class="container">
    <article>
      <p x-text="t.customers.empty"></p>
    </article>
  </main>

  <script>
    document.addEventListener('alpine:init', function () {
      Alpine.data('customersPage', function () {
        return {
          t: window.Strings,
          async init() {
            var session = await window.Auth.requireAuth();
            if (!session) return; // redirect gia' avvenuto
            document.body.removeAttribute('x-cloak');
          },
          async logout() {
            await window.Auth.signOut();
          }
        };
      });
    });
  </script>
</body>
</html>
