<!DOCTYPE html>
<html lang="it" class="sl-theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f8a3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ABT">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <script src="/assets/pwa.js" defer></script>
  <title>Dettaglio cliente -- AnotherBeachToken</title>
  <link rel="stylesheet" href="/vendor/shoelace/2.20.1/themes/light.css">
  <link rel="stylesheet" href="/assets/app.css">
  <script src="/vendor/supabase/2.105.3/supabase.js"></script>
  <script src="/assets/config.js"></script>
  <script src="/assets/strings.js"></script>
  <script src="/assets/auth.js"></script>
  <script src="/assets/nav.js"></script>
  <script type="module" src="/vendor/shoelace/2.20.1/components/dialog/dialog.js"></script>
  <script type="module" src="/vendor/shoelace/2.20.1/components/button/button.js"></script>
  <script defer src="/vendor/alpinejs/3.15.12/alpine.min.js"></script>
  <style>
    /* POS overlay: schermata di addebito a tutto schermo. Page-specific. */
    .pos-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--color-bg);
      display: flex; flex-direction: column;
      padding: var(--space-4);
      animation: pos-enter var(--motion-base) ease-out;
    }
    @keyframes pos-enter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pos-header {
      text-align: center;
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-border);
    }
    .pos-customer {
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: var(--color-ink);
      letter-spacing: var(--tracking-tight);
    }
    .pos-balance {
      font-size: var(--text-sm);
      color: var(--color-ink-muted);
      margin-top: var(--space-1);
    }
    .pos-balance span { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .pos-display {
      font-family: var(--font-mono);
      font-size: clamp(2.5rem, 12vw, 4rem);
      font-weight: var(--weight-bold);
      text-align: center;
      padding: var(--space-5) 0;
      color: var(--color-ink);
      letter-spacing: var(--tracking-tight);
    }
    .pos-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-2);
    }
    .pos-keypad button {
      min-height: 3.5rem;
      font-size: var(--text-xl);
      font-family: var(--font-mono);
      font-weight: var(--weight-medium);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border-strong);
      background: var(--color-surface);
      color: var(--color-ink);
      transition: background var(--motion-fast), border-color var(--motion-fast), transform var(--motion-fast);
    }
    .pos-keypad button:hover  { background: var(--color-surface-alt); border-color: var(--color-ink-muted); }
    .pos-keypad button:active { transform: translateY(1px); background: var(--color-surface-strong); }
    .pos-actions {
      margin-top: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .pos-error { text-align: center; }
  </style>
</head>
<body x-cloak x-data="customerDetailPage" x-init="init()">
  <nav class="app-nav" x-data="appNav" x-init="init()">
    <h1 x-text="t.customerDetail.title"></h1>
    <div class="nav-actions">
      <template x-for="item in items" :key="item.path">
        <a class="btn btn--ghost" :class="item.isCurrent ? 'btn--current' : ''"
           :href="item.path" x-text="item.label"></a>
      </template>
      <button class="btn btn--outline" @click="logout()" x-text="t.logout"></button>
    </div>
  </nav>
  <main class="container">
    <a href="/customers" x-text="t.customerDetail.backToList"></a>

    <article x-show="notFound" x-cloak><p x-text="t.customerDetail.notFound"></p></article>

    <template x-if="customer">
      <div>
        <h2 x-text="customer.last_name + ' ' + customer.first_name"></h2>

        <div class="actions-bar">
          <a :href="qrDataUrl" :download="qrFileName" class="btn btn--outline" x-show="qrDataUrl" x-cloak
             x-text="t.customerDetail.downloadQr"></a>
          <a :href="whatsappBalanceUrl" target="_blank" rel="noopener"
             class="btn btn--outline" x-text="t.customerDetail.sendWhatsApp"></a>
          <a :href="'/checkout/' + customer.id" class="btn btn--primary"
             x-show="canCheckout" x-cloak
             x-text="t.customerDetail.ctaCheckout"></a>
          <button class="btn btn--danger" @click="openDeleteDialog()"
                  x-show="canDelete && balanceReady && openBalance === 0" x-cloak
                  x-text="t.customerDetail.deleteButton"></button>
        </div>

        <h3 x-text="t.customerDetail.sectionAnagrafica"></h3>
        <dl class="anagrafica">
          <dt x-text="t.customerNew.firstName"></dt>
          <dd x-text="customer.first_name"></dd>
          <dt x-text="t.customerNew.lastName"></dt>
          <dd x-text="customer.last_name"></dd>
          <dt x-text="t.customerNew.phone"></dt>
          <dd x-text="customer.phone"></dd>
          <dt x-text="t.customerNew.email"></dt>
          <dd x-text="customer.email || '-'"></dd>
          <dt x-text="t.customerNew.notes"></dt>
          <dd x-text="customer.notes || '-'"></dd>
          <dt x-text="t.customerDetail.createdAt"></dt>
          <dd x-text="formatDate(customer.created_at)"></dd>
        </dl>

        <img class="qr-preview" :src="qrDataUrl" :alt="t.customerDetail.qrAlt" x-show="qrDataUrl" x-cloak>

        <h3 x-text="t.customerDetail.sectionTransactions"></h3>
        <div class="balance-card">
          <strong x-text="t.customerDetail.balance.label"></strong>
          <span x-text="formatBalance(openBalance) + ' EUR'"></span>
          <button class="btn btn--outline btn--sm balance-refresh"
                  @click="refreshTransactions()"
                  :disabled="refreshing"
                  x-text="t.customerDetail.balance.refresh"></button>
        </div>
        <button class="btn btn--primary btn--cta" @click="openPos()" x-text="t.customerDetail.charge.ctaNew"></button>

        <article x-show="transactions.length === 0" x-cloak>
          <p x-text="t.customerDetail.transactions.empty"></p>
        </article>

        <ul class="transactions" x-show="displayTransactions.length > 0" x-cloak>
          <template x-for="tx in displayTransactions" :key="tx.id">
            <li class="tx" :class="txCssClass(tx)">
              <div class="tx-time" x-text="formatTxTime(tx.created_at)"></div>
              <div class="tx-desc" x-text="describeTx(tx)"></div>
              <div class="tx-state">
                <span class="badge" :class="badgeClass(tx)" x-text="badgeText(tx)"></span>
              </div>
              <div class="tx-action" x-show="canReverse(tx)" x-cloak>
                <button class="btn btn--outline btn--sm"
                        @click="openReversalDialog(tx)"
                        x-text="t.customerDetail.reversal.button"></button>
              </div>
              <div class="tx-sub-info" x-show="subInfoText(tx)" x-cloak x-text="subInfoText(tx)"></div>
            </li>
          </template>
        </ul>
        <div class="pos-overlay" x-show="posOpen" x-cloak @keydown.escape.window="closePos()">
          <header class="pos-header">
            <div class="pos-customer" x-text="customer.first_name + ' ' + customer.last_name"></div>
            <div class="pos-balance">
              <span x-text="t.customerDetail.balance.label"></span>:
              <span x-text="formatBalance(openBalance) + ' EUR'"></span>
            </div>
          </header>
          <div class="pos-display" x-text="formatPosDisplay() + ' EUR'"></div>
          <div class="pos-keypad">
            <button type="button" data-key="7" @click="posDigit('7')">7</button>
            <button type="button" data-key="8" @click="posDigit('8')">8</button>
            <button type="button" data-key="9" @click="posDigit('9')">9</button>
            <button type="button" data-key="4" @click="posDigit('4')">4</button>
            <button type="button" data-key="5" @click="posDigit('5')">5</button>
            <button type="button" data-key="6" @click="posDigit('6')">6</button>
            <button type="button" data-key="1" @click="posDigit('1')">1</button>
            <button type="button" data-key="2" @click="posDigit('2')">2</button>
            <button type="button" data-key="3" @click="posDigit('3')">3</button>
            <button type="button" data-key="0" @click="posDigit('0')">0</button>
            <button type="button" data-key="," @click="posComma()">,</button>
            <button type="button" data-key="back" @click="posBackspace()" :aria-label="t.customerDetail.charge.backspaceLabel">&larr;</button>
          </div>
          <div class="pos-actions">
            <button class="btn btn--primary btn--cta" :disabled="!posValid() || posSubmitting"
                    @click="submitCharge()"
                    x-text="posSubmitting ? t.customerDetail.charge.submitting : t.customerDetail.charge.submit"></button>
            <button class="btn btn--outline" @click="closePos()" x-text="t.customerDetail.charge.cancel"></button>
          </div>
          <div x-show="posError" x-cloak class="pos-error" role="alert" x-text="posError"></div>
        </div>
      </div>
    </template>

    <sl-dialog x-ref="reversalDialog" :label="t.customerDetail.reversal.dialogTitle">
      <p x-text="reversalCharge ? t.customerDetail.reversal.dialogBody(formatBalance(reversalCharge.amount), formatTxTime(reversalCharge.created_at)) : ''"></p>
      <sl-button slot="footer" variant="default" @click="closeReversalDialog()"
                 x-text="t.customerDetail.reversal.cancel"></sl-button>
      <sl-button slot="footer" variant="danger" @click="confirmReversal()" :loading="reversalSubmitting"
                 x-text="t.customerDetail.reversal.confirm"></sl-button>
    </sl-dialog>

    <sl-dialog x-ref="deleteDialog" :label="t.customerDetail.deleteDialogTitle">
      <p x-text="customer ? t.customerDetail.deleteDialogBody(customer.first_name, customer.last_name) : ''"></p>
      <sl-button slot="footer" variant="default" @click="closeDeleteDialog()"
                 x-text="t.customerDetail.deleteDialogCancel"></sl-button>
      <sl-button slot="footer" variant="danger" @click="confirmDelete()" :loading="deleting"
                 x-text="t.customerDetail.deleteDialogConfirm"></sl-button>
    </sl-dialog>
  </main>

  <script>
    document.addEventListener('alpine:init', function () {
      Alpine.data('customerDetailPage', function () {
        return {
          t: window.Strings,
          customer: null,
          notFound: false,
          canDelete: false,
          canCheckout: false,
          deleting: false,
          qrDataUrl: '',
          qrFileName: '',
          whatsappBalanceUrl: '',
          session: null,
          transactions: [],
          displayTransactions: [],
          reversalByCharge: {},
          openBalance: 0,
          reversedIds: new Set(),
          posOpen: false,
          posAmount: '',
          posSubmitting: false,
          posError: null,
          reversalCharge: null,
          reversalSubmitting: false,
          refreshing: false,
          balanceReady: false,
          async init() {
            var session = await window.Auth.requireAuth();
            if (!session) return;
            document.body.removeAttribute('x-cloak');
            this.session = session;
            var match = location.pathname.match(/^\/customers\/([0-9a-f-]{36})\/?$/);
            if (!match) { this.notFound = true; return; }
            var id = match[1];
            var resp = await window.Auth.client.from('customers').select('*').eq('id', id).is('deleted_at', null).maybeSingle();
            if (resp.error || !resp.data) {
              this.notFound = true;
              return;
            }
            this.customer = resp.data;
            await this.computeQr();
            await this.refreshTransactions();
            this.computeWhatsAppBalance();
            var role = await window.Auth.getRole();
            this.canDelete = (role === 'admin' || role === 'super_admin');
            this.canCheckout = (role === 'admin' || role === 'super_admin');
            try {
              var params = new URLSearchParams(window.location.search);
              if (params.get('charge') === '1') {
                this.openPos();
              }
            } catch (e) { }
          },
          async computeQr() {
            var publicUrl = window.location.origin + '/qr/' + this.customer.qr_token;
            try {
              var QRCodeModule = await import('/vendor/qrcode/1.5.4/qrcode.esm.min.js');
              var QRCode = QRCodeModule.default || QRCodeModule;
              var dataUrl = await QRCode.toDataURL(publicUrl, { width: 320, margin: 2 });
              this.qrDataUrl = dataUrl;
              this.qrFileName = 'qr-' + this.customer.last_name + '-' + this.customer.first_name + '.png';
            } catch (e) {
              console.error('[detail] qr generation failed', e);
            }
          },
          computeWhatsAppBalance() {
            if (!this.customer) { this.whatsappBalanceUrl = ''; return; }
            var publicUrl = window.location.origin + '/qr/' + this.customer.qr_token;
            var phoneNoPlus = (this.customer.phone || '').replace(/^\+/, '');
            var balanceFormatted = this.formatBalance(this.openBalance);
            var text = this.t.customerDetail.balance.whatsAppText(this.customer.first_name, balanceFormatted, publicUrl);
            this.whatsappBalanceUrl = 'https://wa.me/' + phoneNoPlus + '?text=' + encodeURIComponent(text);
          },
          openDeleteDialog() { this.$refs.deleteDialog.show(); },
          closeDeleteDialog() { this.$refs.deleteDialog.hide(); },
          async confirmDelete() {
            if (this.deleting) return;
            this.deleting = true;
            var resp = await window.Auth.client.from('customers')
              .update({ deleted_at: new Date().toISOString() })
              .eq('id', this.customer.id);
            this.deleting = false;
            if (resp.error) {
              console.error('[detail] soft-delete failed', resp.error);
              alert(this.t.customerDetail.deleteError);
              return;
            }
            window.location.replace('/customers');
          },
          async refreshTransactions() {
            if (!this.customer) return;
            if (this.refreshing) return;
            this.refreshing = true;
            var resp = await window.Auth.client.from('transactions')
              .select('id, type, amount, reversal_of_id, paid, paid_at, payment_method, paid_by_id, created_at, paidBy:profiles!paid_by_id(first_name, last_name)')
              .eq('customer_id', this.customer.id)
              .is('deleted_at', null)
              .order('created_at', { ascending: false });
            if (resp.error) {
              console.error('[detail] refreshTransactions error', resp.error);
              this.transactions = [];
              this.displayTransactions = [];
              this.reversalByCharge = {};
              this.reversedIds = new Set();
              this.openBalance = 0;
              this.refreshing = false;
              return;
            }
            this.transactions = resp.data || [];
            // displayTransactions = charges + reversal orfani (safety): rendering
            // "riga unica" che aggrega charge+reversal sulla riga della charge.
            this.reversedIds = new Set();
            this.reversalByCharge = {};
            var chargeIds = new Set();
            for (var i = 0; i < this.transactions.length; i++) {
              if (this.transactions[i].type === 'charge') {
                chargeIds.add(this.transactions[i].id);
              }
            }
            for (var j = 0; j < this.transactions.length; j++) {
              var tx = this.transactions[j];
              if (tx.type === 'reversal' && tx.reversal_of_id) {
                this.reversedIds.add(tx.reversal_of_id);
                this.reversalByCharge[tx.reversal_of_id] = tx;
              }
            }
            this.displayTransactions = this.transactions.filter(function (t) {
              if (t.type === 'charge') return true;
              if (t.reversal_of_id && chargeIds.has(t.reversal_of_id)) return false;
              return true;
            });
            this.recomputeBalance();
            this.balanceReady = true;
            this.refreshing = false;
          },
          recomputeBalance() {
            var sumCharges = 0, sumReversals = 0;
            for (var i = 0; i < this.transactions.length; i++) {
              var tx = this.transactions[i];
              if (tx.paid) continue;
              var amt = parseFloat(tx.amount) || 0;
              if (tx.type === 'charge') sumCharges += amt;
              else if (tx.type === 'reversal') sumReversals += amt;
            }
            this.openBalance = Math.round((sumCharges - sumReversals) * 100) / 100;
            this.computeWhatsAppBalance();
          },
          formatBalance(n) {
            try {
              return Number(n).toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            } catch (e) { return String(n); }
          },
          formatTxTime(iso) {
            try {
              var d = new Date(iso);
              var dd = String(d.getDate()).padStart(2, '0');
              var mm = String(d.getMonth() + 1).padStart(2, '0');
              var hh = String(d.getHours()).padStart(2, '0');
              var mi = String(d.getMinutes()).padStart(2, '0');
              return dd + '/' + mm + ' ' + hh + ':' + mi;
            } catch (e) { return iso; }
          },
          describeTx(tx) {
            var amount = this.formatBalance(tx.amount);
            return tx.type === 'charge'
              ? this.t.customerDetail.transactions.descCharge(amount)
              : this.t.customerDetail.transactions.descReversal(amount);
          },
          txCssClass(tx) {
            if (tx.type === 'charge' && this.reversedIds.has(tx.id)) return 'tx-annulled';
            return '';
          },
          badgeText(tx) {
            if (tx.type === 'charge' && this.reversedIds.has(tx.id)) return this.t.customerDetail.transactions.badgeAnnullato;
            if (tx.paid) return this.t.customerDetail.transactions.badgeSaldato;
            return this.t.customerDetail.transactions.badgeAperto;
          },
          badgeClass(tx) {
            if (tx.type === 'charge' && this.reversedIds.has(tx.id)) return 'badge-annullato';
            if (tx.paid) return 'badge-saldato';
            return 'badge-aperto';
          },
          paidInfoText(tx) {
            if (!tx.paid) return '';
            var date = this.formatTxTime(tx.paid_at);
            var method = (window.Strings.paymentMethods && window.Strings.paymentMethods[tx.payment_method]) || tx.payment_method;
            if (tx.paidBy && tx.paidBy.first_name) {
              return this.t.customerDetail.transactions.paidInfoWithName(
                date, method, tx.paidBy.first_name + ' ' + tx.paidBy.last_name
              );
            }
            return this.t.customerDetail.transactions.paidInfoNoName(date, method);
          },
          subInfoText(tx) {
            // Priorita': annullato > saldato > niente.
            if (tx.type === 'charge' && this.reversedIds.has(tx.id)) {
              var rev = this.reversalByCharge[tx.id];
              if (rev) {
                return this.t.customerDetail.transactions.annulledInfo(this.formatTxTime(rev.created_at));
              }
              return '';
            }
            if (tx.paid) return this.paidInfoText(tx);
            return '';
          },
          openPos() {
            this.posAmount = '';
            this.posError = null;
            this.posOpen = true;
          },
          closePos() {
            this.posOpen = false;
            this.posAmount = '';
            this.posError = null;
          },
          posDigit(d) {
            if (this.posSubmitting) return;
            if (this.posAmount === '' && d === '0') {
              this.posAmount = '0,';
              return;
            }
            var parts = this.posAmount.split(',');
            if (parts.length === 2 && parts[1].length >= 2) return;
            this.posAmount = this.posAmount + d;
          },
          posComma() {
            if (this.posSubmitting) return;
            if (this.posAmount.indexOf(',') !== -1) return;
            if (this.posAmount === '') { this.posAmount = '0,'; return; }
            this.posAmount = this.posAmount + ',';
          },
          posBackspace() {
            if (this.posSubmitting) return;
            this.posAmount = this.posAmount.slice(0, -1);
          },
          posValid() {
            var n = parseFloat(this.posAmount.replace(',', '.'));
            return !isNaN(n) && n > 0;
          },
          formatPosDisplay() {
            if (this.posAmount === '') return '0,00';
            return this.posAmount;
          },
          async submitCharge() {
            if (this.posSubmitting || !this.posValid()) return;
            if (!this.session || !this.customer) return;
            this.posSubmitting = true;
            this.posError = null;
            var amount = parseFloat(this.posAmount.replace(',', '.'));
            var payload = {
              customer_id: this.customer.id,
              user_id: this.session.user.id,
              type: 'charge',
              amount: amount
            };
            var resp = await window.Auth.client.from('transactions').insert(payload).select('id').single();
            this.posSubmitting = false;
            if (resp.error) {
              console.error('[detail] charge insert error', resp.error);
              this.posError = this.t.customerDetail.charge.error;
              return;
            }
            this.posOpen = false;
            this.posAmount = '';
            await this.refreshTransactions();
          },
          canReverse(tx) {
            return tx.type === 'charge' && !tx.paid && !this.reversedIds.has(tx.id);
          },
          openReversalDialog(tx) {
            this.reversalCharge = tx;
            this.$refs.reversalDialog.show();
          },
          closeReversalDialog() {
            this.$refs.reversalDialog.hide();
            this.reversalCharge = null;
          },
          async confirmReversal() {
            if (this.reversalSubmitting || !this.reversalCharge) return;
            if (!this.session || !this.customer) return;
            this.reversalSubmitting = true;
            var payload = {
              customer_id: this.customer.id,
              user_id: this.session.user.id,
              type: 'reversal',
              amount: this.reversalCharge.amount,
              reversal_of_id: this.reversalCharge.id
            };
            var resp = await window.Auth.client.from('transactions').insert(payload).select('id').single();
            this.reversalSubmitting = false;
            if (resp.error) {
              console.error('[detail] reversal insert error', resp.error);
              alert(this.t.customerDetail.reversal.error);
              return;
            }
            this.$refs.reversalDialog.hide();
            this.reversalCharge = null;
            await this.refreshTransactions();
          },
          formatDate(iso) {
            try { return new Date(iso).toLocaleString('it-IT'); } catch (e) { return iso; }
          },
          async logout() { await window.Auth.signOut(); }
        };
      });
    });
  </script>
</body>
</html>
