<!DOCTYPE html>
<html lang="it" class="sl-theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f8a3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ABT">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>Accedi -- AnotherBeachToken</title>
  <link rel="stylesheet" href="/vendor/shoelace/2.20.1/themes/light.css">
  <link rel="stylesheet" href="/assets/app.css">
  <script src="/vendor/supabase/2.105.3/supabase.js"></script>
  <script src="/assets/config.js"></script>
  <script src="/assets/strings.js"></script>
  <script src="/assets/auth.js"></script>
  <script defer src="/vendor/alpinejs/3.15.12/alpine.min.js"></script>
  <style>
    main.container.login-hero { margin-top: 3.5rem; }
  </style>
</head>
<body x-cloak x-data="loginPage" x-init="init()">
  <main class="container container--narrow login-hero">
    <hgroup>
      <h1 x-text="t.login.title"></h1>
      <p x-text="t.app.title"></p>
    </hgroup>

    <form id="login-form" @submit.prevent="submit()">
      <label>
        <span x-text="t.login.emailLabel"></span>
        <input type="email" x-model="email" required autocomplete="username" :disabled="submitting">
      </label>
      <label>
        <span x-text="t.login.passwordLabel"></span>
        <input type="password" x-model="password" required autocomplete="current-password" :disabled="submitting">
      </label>
      <button type="submit" class="btn btn--primary" :disabled="submitting">
        <span x-text="submitting ? t.login.submitting : t.login.submit"></span>
      </button>
    </form>

    <article x-show="error" x-cloak role="alert">
      <p x-text="errorMessage()"></p>
    </article>
  </main>

  <script>
    document.addEventListener('alpine:init', function () {
      Alpine.data('loginPage', function () {
        return {
          t: window.Strings,
          email: '',
          password: '',
          submitting: false,
          error: null,
          async init() {
            await window.Auth.redirectIfAuthenticated();
            document.body.removeAttribute('x-cloak');
          },
          errorMessage() {
            if (!this.error) return '';
            var key = this.error;
            return (this.t.errors[key] || this.t.errors.unknown);
          },
          async submit() {
            if (this.submitting) return;
            this.submitting = true;
            this.error = null;
            var resp = await window.Auth.signIn(this.email.trim(), this.password);
            if (resp.ok) {
              var role = await window.Auth.getRole();
              window.location.replace(window.Auth.homeForRole(role));
              return;
            }
            this.error = resp.error || 'unknown';
            this.submitting = false;
          }
        };
      });
    });
  </script>
</body>
</html>
