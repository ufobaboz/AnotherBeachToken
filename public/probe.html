<!DOCTYPE html>
<html lang="it" class="sl-theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f8a3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ABT">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <script src="/assets/pwa.js" defer></script>
  <title>Probe -- AnotherBeachToken</title>
  <link rel="stylesheet" href="/vendor/shoelace/2.20.1/themes/light.css">
  <link rel="stylesheet" href="/assets/app.css">
  <script src="/vendor/supabase/2.105.3/supabase.js"></script>
  <script src="/assets/config.js"></script>
  <script src="/assets/strings.js"></script>
  <script src="/assets/auth.js"></script>
  <script src="/assets/nav.js"></script>
  <script defer src="/vendor/alpinejs/3.15.12/alpine.min.js"></script>
  <style>
    .check {
      padding: var(--space-3);
      margin-bottom: var(--space-2);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    }
    .check .badge { margin-right: var(--space-2); }
    .check details { margin-top: var(--space-2); }
  </style>
</head>
<body x-cloak x-data="probePage" x-init="init()">
  <nav class="app-nav" x-data="appNav" x-init="init()">
    <h1 x-text="t.probe.title"></h1>
    <div class="nav-actions">
      <template x-for="item in items" :key="item.path">
        <a class="btn btn--ghost" :class="item.isCurrent ? 'btn--current' : ''"
           :href="item.path" x-text="item.label"></a>
      </template>
      <button class="btn btn--outline" @click="logout()" x-text="t.logout"></button>
    </div>
  </nav>

  <main class="container">
    <p x-text="t.probe.refreshHint"></p>

    <template x-for="check in checks" :key="check.label">
      <div class="check">
        <span class="badge" :class="badgeClass(check.status)" x-text="badgeText(check.status)"></span>
        <strong x-text="check.label"></strong>
        <span x-show="check.summary"> - <span x-text="check.summary"></span></span>
        <details x-show="check.details">
          <summary>Dettagli</summary>
          <pre x-text="formatDetails(check.details)"></pre>
        </details>
      </div>
    </template>
  </main>

  <script>
    document.addEventListener('alpine:init', function () {
      Alpine.data('probePage', function () {
        return {
          t: window.Strings,
          checks: [],
          async init() {
            var session = await window.Auth.requireSuperAdmin();
            if (!session) return;
            document.body.removeAttribute('x-cloak');
            this.checks = [
              { label: 'Config attiva', status: 'pending', summary: '', details: null },
              { label: 'Sessione corrente', status: 'pending', summary: '', details: null },
              { label: 'RPC get_customer_qr_info(token finto)', status: 'pending', summary: '', details: null },
              { label: 'Edge function auth-ping?stamp=false', status: 'pending', summary: '', details: null },
              { label: 'Conteggi tabelle', status: 'pending', summary: '', details: null },
              { label: this.t.probe.openBalanceLabel, status: 'pending', summary: '', details: null },
              { label: 'Profiles per ruolo', status: 'pending', summary: '', details: null },
              { label: 'PWA installabile (manifest + SW)', status: 'pending', summary: '', details: null },
              { label: this.t.probe.backupTitle, status: 'pending', summary: '', details: null }
            ];
            await Promise.allSettled([
              this.runCheck(0, this.checkConfig.bind(this)),
              this.runCheck(1, this.checkSession.bind(this, session)),
              this.runCheck(2, this.checkQrRpc.bind(this)),
              this.runCheck(3, this.checkAuthPing.bind(this)),
              this.runCheck(4, this.checkCounts.bind(this)),
              this.runCheck(5, this.checkOpenBalance.bind(this)),
              this.runCheck(6, this.checkProfilesByRole.bind(this)),
              this.runCheck(7, this.checkPwa.bind(this)),
              this.runCheck(8, this.checkBackupStatus.bind(this))
            ]);
          },
          badgeClass(s) {
            if (s === 'OK') return 'badge-ok';
            if (s === 'FAIL') return 'badge-fail';
            if (s === 'n/a') return 'badge-na';
            return 'badge-pending';
          },
          badgeText(s) {
            if (s === 'OK') return this.t.probe.statusOk;
            if (s === 'FAIL') return this.t.probe.statusFail;
            if (s === 'n/a') return this.t.probe.statusNa;
            return '...';
          },
          formatDetails(d) {
            try { return JSON.stringify(d, null, 2); } catch (e) { return String(d); }
          },
          async runCheck(idx, fn) {
            try {
              var result = await fn();
              this.checks[idx].status = result.status;
              this.checks[idx].summary = result.summary || '';
              this.checks[idx].details = result.details || null;
            } catch (e) {
              this.checks[idx].status = 'FAIL';
              this.checks[idx].summary = (e && e.message) ? e.message : String(e);
              this.checks[idx].details = e;
            }
          },
          async checkConfig() {
            var cfg = window.APP_CONFIG || {};
            var url = cfg.SUPABASE_URL || '';
            var key = cfg.SUPABASE_ANON_KEY || '';
            if (!url || !key) {
              return { status: 'FAIL', summary: 'APP_CONFIG mancante', details: { url: url, keyLen: key.length } };
            }
            return {
              status: 'OK',
              summary: url,
              details: { SUPABASE_URL: url, key_prefix: key.slice(0, 20), key_length: key.length }
            };
          },
          async checkSession(session) {
            var resp = await window.Auth.client
              .from('profiles')
              .select('first_name, last_name, role, last_login_at, created_at')
              .eq('id', session.user.id)
              .maybeSingle();
            if (resp.error) {
              return { status: 'FAIL', summary: resp.error.message, details: resp.error };
            }
            if (!resp.data) {
              return { status: 'FAIL', summary: 'Profilo non trovato', details: { user_id: session.user.id } };
            }
            return {
              status: 'OK',
              summary: resp.data.first_name + ' ' + resp.data.last_name + ' (' + resp.data.role + ')',
              details: {
                user_id: session.user.id,
                email: session.user.email,
                role: resp.data.role,
                first_name: resp.data.first_name,
                last_name: resp.data.last_name,
                last_login_at: resp.data.last_login_at,
                created_at: resp.data.created_at,
                session_expires_at: session.expires_at
              }
            };
          },
          async checkQrRpc() {
            var resp = await window.Auth.client.rpc('get_customer_qr_info', { p_token: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA' });
            if (resp.error) {
              return { status: 'FAIL', summary: resp.error.message, details: resp.error };
            }
            var rows = Array.isArray(resp.data) ? resp.data : (resp.data ? [resp.data] : []);
            return {
              status: 'OK',
              summary: '0 righe (token finto, atteso)',
              details: { rows: rows.length, raw: resp.data }
            };
          },
          async checkAuthPing() {
            var resp = await window.Auth.callAuthPing({ stamp: false });
            if (resp.status !== 200) {
              return { status: 'FAIL', summary: 'HTTP ' + resp.status, details: resp };
            }
            return {
              status: 'OK',
              summary: 'role=' + (resp.body ? resp.body.role : '?') + ', latency=' + resp.latency_ms + 'ms',
              details: resp
            };
          },
          async checkCounts() {
            var c = window.Auth.client;
            var p = await c.from('profiles').select('*', { count: 'exact', head: true });
            var cuActive   = await c.from('customers').select('*', { count: 'exact', head: true })
                                    .is('deleted_at', null);
            var cuDeleted  = await c.from('customers').select('*', { count: 'exact', head: true })
                                    .not('deleted_at', 'is', null);
            var txChargeOpen   = await c.from('transactions').select('*', { count: 'exact', head: true })
                                        .eq('type', 'charge').eq('paid', false).is('deleted_at', null);
            var txChargePaid   = await c.from('transactions').select('*', { count: 'exact', head: true })
                                        .eq('type', 'charge').eq('paid', true).is('deleted_at', null);
            var txReversalOpen = await c.from('transactions').select('*', { count: 'exact', head: true })
                                        .eq('type', 'reversal').eq('paid', false).is('deleted_at', null);
            var txReversalPaid = await c.from('transactions').select('*', { count: 'exact', head: true })
                                        .eq('type', 'reversal').eq('paid', true).is('deleted_at', null);
            var all = [p, cuActive, cuDeleted, txChargeOpen, txChargePaid, txReversalOpen, txReversalPaid];
            var failures = all.filter(function (r) { return r.error; });
            if (failures.length > 0) {
              return { status: 'FAIL', summary: failures[0].error.message,
                       details: {
                         p: p.error, cuActive: cuActive.error, cuDeleted: cuDeleted.error,
                         txChargeOpen: txChargeOpen.error, txChargePaid: txChargePaid.error,
                         txReversalOpen: txReversalOpen.error, txReversalPaid: txReversalPaid.error
                       } };
            }
            return {
              status: 'OK',
              summary: 'profiles=' + p.count
                     + ', customers=' + cuActive.count + ' attivi/' + cuDeleted.count + ' cancellati'
                     + ', transactions: charges ' + txChargeOpen.count + ' aperti/' + txChargePaid.count + ' saldati'
                     + ', reversals ' + txReversalOpen.count + ' aperti/' + txReversalPaid.count + ' saldati',
              details: {
                profiles: p.count,
                customers_active: cuActive.count,
                customers_deleted: cuDeleted.count,
                charges_open: txChargeOpen.count,
                charges_paid: txChargePaid.count,
                reversals_open: txReversalOpen.count,
                reversals_paid: txReversalPaid.count
              }
            };
          },
          async checkOpenBalance() {
            // .range(0, 49999): bypass del default PostgREST (1000). Se il probe
            // diventa lento a stagione piena (> 5s), refactor a RPC SECURITY DEFINER.
            var resp = await window.Auth.client.from('transactions')
              .select('amount, type, customer_id')
              .is('deleted_at', null).eq('paid', false)
              .range(0, 49999);
            if (resp.error) {
              return { status: 'FAIL', summary: resp.error.message, details: resp.error };
            }
            var sumCh = 0, sumRev = 0, custIds = new Set();
            (resp.data || []).forEach(function (tx) {
              var amt = parseFloat(tx.amount) || 0;
              if (tx.type === 'charge') sumCh += amt;
              else if (tx.type === 'reversal') sumRev += amt;
              custIds.add(tx.customer_id);
            });
            var total = Math.round((sumCh - sumRev) * 100) / 100;
            return {
              status: 'OK',
              summary: total.toFixed(2) + ' EUR aperti, ' + (resp.data || []).length + ' movimenti, ' + custIds.size + ' clienti',
              details: {
                total_open_eur: total,
                movements_open: (resp.data || []).length,
                distinct_customers: custIds.size
              }
            };
          },
          async checkProfilesByRole() {
            var c = window.Auth.client;
            async function cnt(role, deleted) {
              var q = c.from('profiles').select('*', { count: 'exact', head: true }).eq('role', role);
              if (deleted === false) q = q.is('deleted_at', null);
              if (deleted === true)  q = q.not('deleted_at', 'is', null);
              return await q;
            }
            var results = await Promise.all([
              cnt('super_admin', false), cnt('super_admin', true),
              cnt('admin',       false), cnt('admin',       true),
              cnt('operator',    false), cnt('operator',    true)
            ]);
            var failures = results.filter(function (r) { return r.error; });
            if (failures.length > 0) {
              return { status: 'FAIL', summary: failures[0].error.message, details: failures.map(function (f) { return f.error; }) };
            }
            var saA = results[0], saD = results[1], aA = results[2], aD = results[3], oA = results[4], oD = results[5];
            return {
              status: 'OK',
              summary: 'super_admin=' + saA.count + (saD.count ? '/' + saD.count + ' cancellati' : '')
                     + ', admin=' + aA.count + '/' + aD.count + ' attivi/cancellati'
                     + ', operator=' + oA.count + '/' + oD.count + ' attivi/cancellati',
              details: {
                super_admin_active: saA.count,
                super_admin_deleted: saD.count,
                admin_active: aA.count,
                admin_deleted: aD.count,
                operator_active: oA.count,
                operator_deleted: oD.count
              }
            };
          },
          async checkPwa() {
            var manifestStatus = null;
            var manifestJson = null;
            try {
              var resp = await fetch('/manifest.webmanifest', { cache: 'no-store' });
              manifestStatus = resp.status;
              if (resp.ok) manifestJson = await resp.json();
            } catch (e) {
              return { status: 'FAIL', summary: 'fetch manifest fallita: ' + (e && e.message ? e.message : String(e)),
                       details: { error: String(e) } };
            }
            if (manifestStatus !== 200 || !manifestJson) {
              return { status: 'FAIL', summary: 'manifest HTTP ' + manifestStatus,
                       details: { manifest_status: manifestStatus } };
            }
            var requiredFields = ['name', 'short_name', 'start_url', 'display', 'icons'];
            var missing = requiredFields.filter(function (f) { return !(f in manifestJson); });
            if (missing.length > 0) {
              return { status: 'FAIL', summary: 'campi manifest mancanti: ' + missing.join(','),
                       details: { manifest: manifestJson } };
            }
            var swSupported = ('serviceWorker' in navigator);
            var swRegistered = false;
            var swActive = false;
            var swScope = null;
            if (swSupported) {
              try {
                var reg = await navigator.serviceWorker.getRegistration();
                swRegistered = !!reg;
                swActive = !!(reg && reg.active);
                swScope = reg ? reg.scope : null;
              } catch (e) { }
            }
            var displayMode = 'browser';
            try {
              if (window.matchMedia('(display-mode: standalone)').matches) displayMode = 'standalone';
              else if (window.matchMedia('(display-mode: minimal-ui)').matches) displayMode = 'minimal-ui';
              else if (window.matchMedia('(display-mode: fullscreen)').matches) displayMode = 'fullscreen';
            } catch (e) { }
            var status = (swSupported && swRegistered) ? 'OK' : 'FAIL';
            var swSummary = swActive ? 'active' : (swRegistered ? 'registered' : 'none');
            return {
              status: status,
              summary: 'manifest="' + manifestJson.name + '", sw=' + swSummary + ', display=' + displayMode,
              details: {
                manifest_status: manifestStatus,
                manifest_name: manifestJson.name,
                manifest_short_name: manifestJson.short_name,
                manifest_start_url: manifestJson.start_url,
                manifest_display: manifestJson.display,
                manifest_theme_color: manifestJson.theme_color,
                manifest_icons_count: Array.isArray(manifestJson.icons) ? manifestJson.icons.length : 0,
                sw_supported: swSupported,
                sw_registered: swRegistered,
                sw_active: swActive,
                sw_scope: swScope,
                display_mode: displayMode,
                ios_safari: !!(window.PwaInstall && window.PwaInstall.isIosSafari && window.PwaInstall.isIosSafari())
              }
            };
          },
          async checkBackupStatus() {
            // callEdgeFunction (NON supabase-js .functions.invoke): l'invoke
            // manda x-client-info, che il CORS preflight delle nostre edge
            // function non whitelista, rompendo la chiamata.
            var resp = await window.Auth.callEdgeFunction('probe-backup-status', {});
            if (resp.status !== 200) {
              return { status: 'FAIL', summary: 'HTTP ' + resp.status, details: resp };
            }
            var data = resp.body || {};
            if (data.configured === false) {
              return { status: 'n/a', summary: this.t.probe.backupNotConfigured, details: data };
            }
            if (!data.last_backup_date) {
              return { status: 'FAIL', summary: this.t.probe.backupNone, details: data };
            }
            var ageH = data.age_hours;
            var found = data.found_files;
            var expected = data.expected_files;
            if (found < expected) {
              return {
                status: 'FAIL',
                summary: this.t.probe.backupIncomplete(data.last_backup_date, found, expected),
                details: data
              };
            }
            if (ageH >= 30) {
              return {
                status: 'FAIL',
                summary: this.t.probe.backupStale(ageH, data.last_backup_date),
                details: data
              };
            }
            return {
              status: 'OK',
              summary: this.t.probe.backupOk(data.last_backup_date, ageH, found, expected),
              details: data
            };
          },
          async logout() {
            await window.Auth.signOut();
          }
        };
      });
    });
  </script>
</body>
</html>
