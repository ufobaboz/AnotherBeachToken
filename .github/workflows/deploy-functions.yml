name: Deploy edge functions

on:
  push:
    branches: [main, develop]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve target project ref
        run: |
          if [ "$GITHUB_REF" = "refs/heads/develop" ]; then
            echo "PROJECT_REF=${{ secrets.SUPABASE_PROJECT_REF_DEV }}" >> $GITHUB_ENV
            echo "TARGET_ENV=DEV" >> $GITHUB_ENV
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "PROJECT_REF=${{ secrets.SUPABASE_PROJECT_REF_PRD }}" >> $GITHUB_ENV
            echo "TARGET_ENV=PRD" >> $GITHUB_ENV
          else
            echo "Unknown branch $GITHUB_REF"
            exit 1
          fi

      - name: Deploy all functions
        run: |
          echo "Deploying to $TARGET_ENV (ref=$PROJECT_REF)"
          supabase functions deploy --project-ref "$PROJECT_REF"
