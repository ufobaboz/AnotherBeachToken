name: E2E

on:
  push:
    branches: [develop]
    paths:
      - 'public/**'
      - 'src/**'
      - 'e2e/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright (chromium, prod)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deploys to settle
        env:
          APP_URL: https://anotherbeachproject-dev.sovereto.workers.dev
        run: |
          sleep 60
          for i in $(seq 1 12); do
            if curl -fsSL "$APP_URL/login" | grep -q 'id="login-form"'; then
              echo "App live"
              exit 0
            fi
            echo "Retry $i: app not yet live"
            sleep 5
          done
          echo "App not responding after timeout"
          exit 1

      - name: Run E2E suite
        env:
          APP_URL: https://anotherbeachproject-dev.sovereto.workers.dev
          TEST_SUPER_ADMIN_EMAIL: ${{ secrets.TEST_SUPER_ADMIN_EMAIL }}
          TEST_SUPER_ADMIN_PASSWORD: ${{ secrets.TEST_SUPER_ADMIN_PASSWORD }}
          CI: 'true'
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 14
